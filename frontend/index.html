<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renty AI Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2319c37d' d='M12 2c.5 4.5 3.5 7.5 8 8-4.5.5-7.5 3.5-8 8-.5-4.5-3.5-7.5-8-8 4.5-.5 7.5-3.5 8-8z'/></svg>" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-top">
        <button id="new-chat" class="new-chat-btn">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New chat
        </button>
        <button id="collapse-sidebar" class="icon-btn" title="Collapse sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
      <nav id="conversation-list" class="conversation-list"></nav>
    </aside>

    <!-- Main -->
    <main id="main">
      <header id="topbar">
        <button id="show-sidebar" class="icon-btn" title="Open sidebar" style="display:none;">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="topbar-title">Renty AI Analytics</div>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <svg id="icon-moon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </header>

      <div id="thread" class="thread">
        <!-- Welcome / empty state -->
        <div id="welcome" class="welcome">
          <div class="welcome-logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c.5 4.5 3.5 7.5 8 8-4.5.5-7.5 3.5-8 8-.5-4.5-3.5-7.5-8-8 4.5-.5 7.5-3.5 8-8z"/></svg></div>
          <h1>Renty AI Analytics</h1>
          <p>Ask anything about the rental data — branches, contracts, bookings, demand, pricing, utilization.</p>
          <div id="suggestions" class="suggestions"></div>
        </div>
      </div>

      <div class="composer-wrap">
        <form id="composer" class="composer">
          <textarea id="input" rows="1" placeholder="Message Renty Analytics…" autofocus></textarea>
          <button id="send" type="submit" class="send-btn" title="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
          <button id="stop" type="button" class="stop-btn" title="Stop" style="display:none;">
            <svg viewBox="0 0 24 24" width="16" height="16"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
          </button>
        </form>
        <div class="composer-hint">Renty AI may produce inaccurate information. Numbers come from the live database.</div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
